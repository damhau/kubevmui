---
# ClusterRole that allows reading DataVolumes and PVCs across namespaces
# Required for CDI cross-namespace cloning (global images)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubevmui-cdi-clone
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["cdi.kubevirt.io"]
    resources: ["datavolumes", "datavolumes/source"]
    verbs: ["get", "list", "create"]
---
# Bind the role to all service accounts so any namespace can clone from any other
# In production you'd scope this to specific namespaces/service accounts
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubevmui-cdi-clone
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubevmui-cdi-clone
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:serviceaccounts
