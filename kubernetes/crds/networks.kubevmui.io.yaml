apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: networks.kubevmui.io
spec:
  group: kubevmui.io
  names:
    kind: Network
    plural: networks
    singular: network
    shortNames:
      - net
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - displayName
                - networkType
                - interfaceType
              properties:
                displayName:
                  type: string
                  description: Human-readable name for this network
                description:
                  type: string
                  default: ""
                networkType:
                  type: string
                  enum: [pod, multus]
                interfaceType:
                  type: string
                  enum: [masquerade, bridge]
                bridgeName:
                  type: string
                  description: Name of the bridge created by NNCP (bridge type only)
                vlanId:
                  type: integer
                  description: Optional VLAN ID
                dhcpEnabled:
                  type: boolean
                  default: true
                subnet:
                  type: string
                  description: CIDR notation (informational)
                gateway:
                  type: string
                  description: Gateway IP (informational)
                macSpoofCheck:
                  type: boolean
                  default: false
                cniConfig:
                  type: string
                  description: Full CNI JSON config for NAD generation
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Type
          type: string
          jsonPath: .spec.networkType
        - name: Interface
          type: string
          jsonPath: .spec.interfaceType
        - name: Bridge
          type: string
          jsonPath: .spec.bridgeName
        - name: VLAN
          type: integer
          jsonPath: .spec.vlanId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
