apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: images.kubevmui.io
spec:
  group: kubevmui.io
  names:
    kind: Image
    plural: images
    singular: image
    shortNames:
      - img
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - displayName
                - source
              properties:
                displayName:
                  type: string
                  description: Human-readable name for the image
                description:
                  type: string
                  default: ""
                osType:
                  type: string
                  enum: [linux, windows]
                  description: Operating system type
                mediaType:
                  type: string
                  enum: [disk, iso]
                  default: disk
                  description: Media type - disk for OS/data images, iso for CD-ROM ISOs
                source:
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      enum: [http, registry, pvc, container_disk, upload]
                      description: Source type for the image
                    url:
                      type: string
                      description: Source URL (HTTP URL, registry path, or container image)
                storage:
                  type: object
                  properties:
                    namespace:
                      type: string
                      default: default
                      description: Namespace where the backing DataVolume/PVC is stored
                    sizeGb:
                      type: integer
                      default: 20
                      description: Disk size in GiB
                    storageClass:
                      type: string
                      description: Kubernetes StorageClass to use
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: OS
          type: string
          jsonPath: .spec.osType
        - name: Media
          type: string
          jsonPath: .spec.mediaType
        - name: Source
          type: string
          jsonPath: .spec.source.type
        - name: URL
          type: string
          jsonPath: .spec.source.url
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
