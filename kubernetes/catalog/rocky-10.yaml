apiVersion: catalog.kubevmui.io/v1
kind: CatalogEntry
metadata:
  name: rocky-10
spec:
  displayName: "Rocky Linux 10"
  description: "Enterprise-grade Linux distribution compatible with RHEL 10"
  category: os
  osType: linux
  icon: rocky
  maintainer: kubevmui
  image:
    sourceType: http
    sourceUrl: https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base.latest.x86_64.qcow2
    defaultSizeGb: 20
  cloudInit:
    userData: |
      #cloud-config
      package_update: true
      packages: [qemu-guest-agent]
      runcmd:
        - systemctl enable --now qemu-guest-agent
  templates:
    - name: small
      displayName: "Small (1 vCPU / 1 GB)"
      cpuCores: 1
      memoryMb: 1024
    - name: medium
      displayName: "Medium (2 vCPU / 4 GB)"
      cpuCores: 2
      memoryMb: 4096
    - name: large
      displayName: "Large (4 vCPU / 8 GB)"
      cpuCores: 4
      memoryMb: 8192
