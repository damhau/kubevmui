apiVersion: kubevmui.io/v1
kind: CatalogEntry
metadata:
  name: fedora-41
spec:
  displayName: "Fedora 41"
  description: "Cutting-edge Linux distribution sponsored by Red Hat"
  category: os
  osType: linux
  icon: fedora
  maintainer: kubevmui
  image:
    sourceType: http
    sourceUrl: https://download.fedoraproject.org/pub/fedora/linux/releases/41/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2
    defaultSizeGb: 20
  cloudInit:
    userData: |
      #cloud-config
      package_update: true
      packages: [qemu-guest-agent]
      runcmd:
        - systemctl enable --now qemu-guest-agent
  templates:
    - name: small
      displayName: "Small (1 vCPU / 1 GB)"
      cpuCores: 1
      memoryMb: 1024
    - name: medium
      displayName: "Medium (2 vCPU / 4 GB)"
      cpuCores: 2
      memoryMb: 4096
    - name: large
      displayName: "Large (4 vCPU / 8 GB)"
      cpuCores: 4
      memoryMb: 8192
