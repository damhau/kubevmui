apiVersion: kubevmui.io/v1
kind: CatalogEntry
metadata:
  name: almalinux-9
spec:
  displayName: "AlmaLinux 9"
  description: "Community-driven RHEL-compatible enterprise Linux"
  category: os
  osType: linux
  icon: almalinux
  maintainer: kubevmui
  image:
    sourceType: http
    sourceUrl: https://repo.almalinux.org/almalinux/9/cloud/x86_64/images/AlmaLinux-9-GenericCloud-latest.x86_64.qcow2
    defaultSizeGb: 20
  cloudInit:
    userData: |
      #cloud-config
      package_update: true
      packages: [qemu-guest-agent]
      runcmd:
        - systemctl enable --now qemu-guest-agent
  templates:
    - name: small
      displayName: "Small (1 vCPU / 1 GB)"
      cpuCores: 1
      memoryMb: 1024
    - name: medium
      displayName: "Medium (2 vCPU / 4 GB)"
      cpuCores: 2
      memoryMb: 4096
    - name: large
      displayName: "Large (4 vCPU / 8 GB)"
      cpuCores: 4
      memoryMb: 8192
