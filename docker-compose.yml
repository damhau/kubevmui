services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro
    environment:
      - KUBEVMUI_DEBUG=true
      - KUBEVMUI_KUBECONFIG_PATH=/root/.kube/config
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - frontend
